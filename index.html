<!DOCTYPE html>

</head>
<body>
    <div class="premium-container" style="max-width: 560px; margin: 4rem auto; text-align: center;">
        <h1 class="title-gradient">PatiRota</h1>
        <p style="color: var(--text-secondary); margin: 1rem 0 1.5rem;">
            Bu dosyayi dogrudan acmayin. Once sunucuyu baslatin, sonra asagidaki adresi kullanin.
        </p>
        <p style="font-weight: 600;">1. Proje klasorunde <code>baslat.bat</code> calistirin</p>
        <p style="font-weight: 600;">2. Tarayicida <a href="http://localhost:8080" style="color: var(--accent);">http://localhost:8080</a> acin (konum icin 127.0.0.1 degil)</p>
        <p style="color: var(--text-secondary); font-size: 0.85rem; margin-top: 1.5rem;">
            Ilk kurulum icin once <code>kurulum.bat</code> calistirin.
        </p>
    </div>
